apiVersion: apps/v1
kind: Deployment
metadata:
  name: module1-service
  labels:
    app: module1-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: module1-service
  template:
    metadata:
      labels:
        app: module1-service
    spec:
      containers:
        - name: module1-service
          image: module1-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_PORT
              value: "8080"
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: module1-service
spec:
  selector:
    app: module1-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: module1-service
spec:
  rules:
    - host: module1.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: module1-service
                port:
                  number: 80

