name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Go test (all modules)
        run: go test ./...

      - name: Build module1-service Docker image
        run: |
          cd module1-service
          docker build -t module1-service:ci .

